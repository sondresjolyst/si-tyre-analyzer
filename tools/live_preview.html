<!doctype html>
<!-- Standalone preview of the on-device /live dashboard with synthetic data.
     Mirrors src/web/WebSite.cpp pageLive(). Fixed 20-120 deg colour scale. -->
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>SI Tyre Analyzer — Live (preview)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111827;--bgd:#0b1220;--surface:#1f2937;--border:#374151;
--txt:#f3f4f6;--dim:#cbd5e1;--muted:#9ca3af;--muted2:#6b7280;
--acc:#2563eb;--acch:#1d4ed8;--blu:#60a5fa;--grn:#22c55e;--red:#f87171}
body{font-family:"Segoe UI",-apple-system,Roboto,system-ui,sans-serif;
color:var(--txt);min-height:100vh;padding:18px 14px 44px;background:var(--bg);
background-image:radial-gradient(130% 90% at 50% -12%,rgba(37,99,235,.10),
transparent 55%);background-attachment:fixed}
.wrap{max-width:580px;margin:0 auto}
.bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.badge{display:inline-flex;align-items:center;gap:6px;
font:600 11px/1 Consolas,'Cascadia Mono',monospace;letter-spacing:.09em;
text-transform:uppercase;padding:7px 10px;border-radius:7px;
background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted2)}
.dot.on{background:var(--grn)}
.btn{display:block;width:100%;text-align:center;padding:13px;
border-radius:10px;font:700 14px/1.2 inherit;letter-spacing:.05em;
text-transform:uppercase;cursor:pointer;text-decoration:none;
background:transparent;color:var(--txt);border:1px solid var(--border)}
.btn:hover{background:var(--surface)}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tyre{background:var(--surface);border:1px solid var(--border);
border-radius:12px;padding:10px}
.tyre .th{display:flex;align-items:center;justify-content:space-between;
font:700 13px/1 Consolas,'Cascadia Mono',monospace;letter-spacing:.1em;
margin-bottom:8px}
.heat{display:grid;gap:0;border-radius:8px;overflow:hidden;
aspect-ratio:.78;width:78%;margin:0 auto;border:1px solid var(--bgd)}
.cell{display:flex;align-items:center;justify-content:center;
font:700 11px/1 Consolas,'Cascadia Mono',monospace;color:#fff;
text-shadow:0 1px 2px rgba(0,0,0,.7)}
.stat{font:600 11px/1 Consolas,'Cascadia Mono',monospace;color:var(--muted);
text-align:center;margin-top:8px;letter-spacing:.02em}
.legend{margin:16px auto 0;max-width:320px}
.legbar{height:12px;border-radius:6px;border:1px solid var(--border);
background:linear-gradient(90deg,rgb(30,70,200) 0%,rgb(30,165,215) 20%,
rgb(40,185,80) 40%,rgb(70,200,70) 60.6%,rgb(200,210,50) 70%,
rgb(240,150,30) 85%,rgb(215,30,30) 100%)}
.leglbl{display:flex;justify-content:space-between;
font:600 11px/1 Consolas,'Cascadia Mono',monospace;color:var(--muted);
margin-top:5px}
</style>
</head>
<body><div class='wrap'>
<div class='lgrid'>
<div class='tyre'><div class='th'><span>FL</span><span class='dot' id='dFL'></span></div><div class='heat' id='FL'></div><div class='stat' id='sFL'>—</div></div>
<div class='tyre'><div class='th'><span>FR</span><span class='dot' id='dFR'></span></div><div class='heat' id='FR'></div><div class='stat' id='sFR'>—</div></div>
<div class='tyre'><div class='th'><span>RL</span><span class='dot' id='dRL'></span></div><div class='heat' id='RL'></div><div class='stat' id='sRL'>—</div></div>
<div class='tyre'><div class='th'><span>RR</span><span class='dot' id='dRR'></span></div><div class='heat' id='RR'></div><div class='stat' id='sRR'>—</div></div>
</div>
<div class='legend'><div class='legbar'></div>
<div class='leglbl'><span id='lgLo'>60&deg;</span><span id='lgMid'>85&deg;</span><span id='lgHi'>110&deg;</span></div></div>
<div style='display:flex;gap:10px;align-items:center;justify-content:center;margin-top:16px;color:var(--muted);font:600 12px/1 Consolas,monospace'>
<span>Optimal &deg;C</span>
<input id='optLo' type='number' value='80' style='width:64px;padding:6px;border-radius:7px;border:1px solid var(--border);background:var(--bgd);color:var(--txt)'>
<span>&ndash;</span>
<input id='optHi' type='number' value='95' style='width:64px;padding:6px;border-radius:7px;border:1px solid var(--border);background:var(--bgd);color:var(--txt)'>
</div>
<a class='btn' href='#' style='margin-top:18px'>&larr; Back</a>

<script>
const COLS=9, ROWS=5, MID=Math.floor(ROWS/2);
let OPTLO=80, OPTHI=95, LO=60, HI=110;
// Cold 40% / optimal 30% / high 15% / superhigh 15%; scale derives from window.
const RAMP=[[0,30,70,200],[.2,30,165,215],[.4,40,185,80],
            [.606,70,200,70],[.7,200,210,50],[.85,240,150,30],[1,215,30,30]];
function applyWindow(){
  OPTLO=+document.getElementById('optLo').value||80;
  OPTHI=+document.getElementById('optHi').value||95;
  const g=Math.max(1,OPTHI-OPTLO);
  LO=OPTLO-1.33333*g; HI=OPTHI+g;
  document.getElementById('lgLo').innerHTML=Math.round(LO)+'&deg;';
  document.getElementById('lgMid').innerHTML=Math.round((LO+HI)/2)+'&deg;';
  document.getElementById('lgHi').innerHTML=Math.round(HI)+'&deg;';
}
document.getElementById('optLo').addEventListener('input',applyWindow);
document.getElementById('optHi').addEventListener('input',applyWindow);
applyWindow();
function color(t){
  let f=(t-LO)/(HI-LO); f=Math.max(0,Math.min(1,f));
  let i=0; while(i<RAMP.length-2 && f>RAMP[i+1][0]) i++;
  const a=RAMP[i], b=RAMP[i+1], u=(f-a[0])/(b[0]-a[0]);
  return `rgb(${Math.round(a[1]+(b[1]-a[1])*u)},${Math.round(a[2]+(b[2]-a[2])*u)},${Math.round(a[3]+(b[3]-a[3])*u)})`;
}
['FL','FR','RL','RR'].forEach(id=>{
  const el=document.getElementById(id);
  el.style.gridTemplateColumns='repeat('+COLS+',1fr)';
  for(let i=0;i<COLS*ROWS;i++){const d=document.createElement('div');d.className='cell';el.appendChild(d);}
});
function draw(id,temps){
  const cells=document.getElementById(id).children;
  for(let i=0;i<temps.length;i++){
    cells[i].style.background=color(temps[i]);
    cells[i].textContent=(Math.floor(i/COLS)==MID)?Math.round(temps[i]):'';
  }
  let mn=Math.min(...temps),mx=Math.max(...temps);
  let av=temps.reduce((a,b)=>a+b,0)/temps.length;
  document.getElementById('s'+id).textContent=
    'min '+Math.round(mn)+'°  avg '+Math.round(av)+'°  max '+Math.round(mx)+'°';
  document.getElementById('d'+id).className='dot on';
}
function frame(t,seed){
  const ambient=55, peak=85+seed*4;
  const warm=ambient+(peak-ambient)*(1-Math.exp(-t/40));
  const hotCol=(COLS-1)*(0.5+0.45*Math.sin(t*0.5+seed));
  const cx=(COLS-1)/2;
  let g=new Array(COLS*ROWS);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const n=(c-cx)/cx; let v=warm-12*n*n+(r-1)*1.5;
    const dc=c-hotCol; v+=14*Math.exp(-(dc*dc)/2.0);
    v+=(Math.random()*3-1.5); g[r*COLS+c]=v;
  }
  return g;
}
let t0=Date.now();
function tick(){
  const t=(Date.now()-t0)/1000;
  draw('FL',frame(t,0)); draw('FR',frame(t,0.4));
  draw('RL',frame(t,0.8)); draw('RR',frame(t,1.2));
}
setInterval(tick,500); tick();
</script>
</div></body></html>
