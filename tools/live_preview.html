<!doctype html>
<!-- Standalone preview of the on-device /live dashboard with synthetic data.
     Per-column average shown inside the middle row of each heatmap. -->
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Garge Tyre Sensor — Live (preview)</title>
<style>
body{background:#111827;color:#f3f4f6;font-family:-apple-system,'Segoe UI',sans-serif;margin:0;padding:12px}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:16px;margin:0 0 2px}
.muted{color:#6b7280;font-size:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tyre{background:#1f2937;border-radius:10px;padding:8px}
.tyre h2{font-size:13px;margin:0 0 6px;text-align:center}
.heat{display:grid;gap:0;border-radius:6px;overflow:hidden}
.cell{aspect-ratio:0.55;display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}
</style>
</head>
<body><div class='wrap'>
<h1>Live tyre temperatures</h1>
<div class='muted'>Preview with synthetic data &middot; grid 9&times;5 &middot; &deg;C (middle row)</div>
<div class='grid'>
<div class='tyre'><h2>FL</h2><div class='heat' id='FL'></div></div>
<div class='tyre'><h2>FR</h2><div class='heat' id='FR'></div></div>
<div class='tyre'><h2>RL</h2><div class='heat' id='RL'></div></div>
<div class='tyre'><h2>RR</h2><div class='heat' id='RR'></div></div>
</div>
<div class='muted' id='clock' style='margin-top:10px'></div>

<script>
const COLS=9, ROWS=5, MID=Math.floor(ROWS/2);
function color(t,min,max){
  let f=(t-min)/Math.max(1,max-min); f=Math.max(0,Math.min(1,f));
  let r=Math.round(255*Math.min(1,f*2));
  let b=Math.round(255*Math.min(1,(1-f)*2));
  let g=Math.round(80*(1-Math.abs(f-0.5)*2));
  return `rgb(${r},${g},${b})`;
}
const wheels=['FL','FR','RL','RR'];
wheels.forEach(id=>{
  const el=document.getElementById(id);
  el.style.gridTemplateColumns='repeat('+COLS+',1fr)';
  for(let i=0;i<COLS*ROWS;i++){const d=document.createElement('div');d.className='cell';el.appendChild(d);}
});
function draw(id,temps){
  const cells=document.getElementById(id).children;
  let mn=Math.min(...temps), mx=Math.max(...temps);
  for(let i=0;i<temps.length;i++){
    cells[i].style.background=color(temps[i],mn,mx);
    cells[i].textContent='';
  }
  // Show each middle-row block's actual temperature.
  for(let c=0;c<COLS;c++){
    cells[MID*COLS+c].textContent=Math.round(temps[MID*COLS+c]);
  }
}
function frame(t,seed){
  const ambient=55, peak=85+seed*4;
  const warm=ambient+(peak-ambient)*(1-Math.exp(-t/40));
  const hotCol=(COLS-1)*(0.5+0.45*Math.sin(t*0.5+seed));
  const cx=(COLS-1)/2;
  let g=new Array(COLS*ROWS);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const n=(c-cx)/cx; let v=warm-12*n*n+(r-1)*1.5;
    const dc=c-hotCol; v+=14*Math.exp(-(dc*dc)/2.0);
    v+=(Math.random()*3-1.5); g[r*COLS+c]=v;
  }
  return g;
}
let t0=Date.now();
function tick(){
  const t=(Date.now()-t0)/1000;
  draw('FL',frame(t,0)); draw('FR',frame(t,0.4));
  draw('RL',frame(t,0.8)); draw('RR',frame(t,1.2));
  document.getElementById('clock').textContent='t = '+t.toFixed(1)+' s';
}
setInterval(tick,500); tick();
</script>
</div></body></html>
