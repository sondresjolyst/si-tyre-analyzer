; PlatformIO Project Configuration File
;
; TyreTemp — ESP32-S3 tyre temperature logger (MLX90640).
; One firmware for all devices; role/wheel/has_sensor are runtime EEPROM
; config (web UI). The custom_* values below are only compile-time defaults.

[platformio]
default_envs = esp32-s3-devkitc-1

[test]
extra_include_dirs = src

; ----------------------------------------------------------------------------
; Native unit-test environments (no hardware)
; ----------------------------------------------------------------------------
[env:native_downsample]
platform = native
test_framework = unity
test_filter = test_downsample
build_flags =
	-Isrc
	-D GRID_COLS=6
	-D GRID_ROWS=3
build_src_filter = -<*>
lib_ldf_mode = off
lib_deps = throwtheswitch/Unity@^2.6.1

[env:native_logformat]
platform = native
test_framework = unity
test_filter = test_logformat
build_flags =
	-Isrc
	-D GRID_COLS=6
	-D GRID_ROWS=3
build_src_filter = -<*>
lib_ldf_mode = off
lib_deps = throwtheswitch/Unity@^2.6.1

[env:native_version]
platform = native
test_framework = unity
test_filter = test_version
build_flags =
	-Isrc
build_src_filter = -<*>
lib_ldf_mode = off
lib_deps = throwtheswitch/Unity@^2.6.1

[env:native_colormap]
platform = native
test_framework = unity
test_filter = test_colormap
build_flags =
	-Isrc
build_src_filter = -<*>
lib_ldf_mode = off
lib_deps = throwtheswitch/Unity@^2.6.1

; ----------------------------------------------------------------------------
; Hardware environment (base). Per-device envs extend this and only override
; the runtime defaults; real role/wheel come from EEPROM (web UI).
; ----------------------------------------------------------------------------
[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 9600
monitor_rts = 0
monitor_dtr = 0
monitor_echo = yes
monitor_filters =
	default
	time
build_flags =
	-Isrc
	-I"${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src"
	-D PRODUCER_NAME=\"${this.custom_producer_name}\"
	-D SENSOR_TYPE=\"${this.custom_sensor_type}\"    ; "mock" or "mlx90640"
	-D DEVICE_ROLE=\"${this.custom_device_role}\"    ; "master" or "slave"
	-D WHEEL_POS=\"${this.custom_wheel_pos}\"        ; "FL" "FR" "RL" "RR"
	-D HAS_SENSOR=${this.custom_has_sensor}          ; 1 wheel unit, 0 dash master
	-D GRID_COLS=${this.custom_grid_cols}
	-D GRID_ROWS=${this.custom_grid_rows}
	-D SAMPLE_RATE_HZ=${this.custom_sample_rate_hz}
	-D SESSION_MAX_SEC=${this.custom_session_max_sec}
	-D ESPNOW_CHANNEL=${this.custom_espnow_channel}
	-D BUTTON2_PIN=${this.custom_button2_pin}
	-D I2C_SDA_PIN=18 ; 18 esp32s3 or 21 esp32
	-D I2C_SCL_PIN=17 ; 17 esp32s3 or 22 esp32
	-D I2C_CLOCK_HZ=${this.custom_i2c_clock_hz}      ; 400000, or 1000000 for >8 Hz
	-D VERSION=\"v${this.custom_version}\"
	-D HAS_DISPLAY=${this.custom_has_display}
	-D TFT_SCK=${this.custom_tft_sck}
	-D TFT_MOSI=${this.custom_tft_mosi}
	-D TFT_MISO=${this.custom_tft_miso}
	-D TFT_CS=${this.custom_tft_cs}
	-D TFT_DC=${this.custom_tft_dc}
	-D TFT_RST=${this.custom_tft_rst}
	-D TOUCH_CS=${this.custom_touch_cs}
	-D TOUCH_IRQ=${this.custom_touch_irq}
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
custom_producer_name = si_tyre_analyzer
custom_sensor_type = mock           ; "mock" or "mlx90640"
custom_device_role = master         ; first-boot default; set per device in web UI
custom_wheel_pos = FL               ; FL / FR / RL / RR
custom_has_sensor = 1               ; 1 = wheel unit (logs), 0 = dash master
custom_grid_cols = 9
custom_grid_rows = 5
custom_sample_rate_hz = 2
custom_session_max_sec = 1800       ; 30 min
custom_espnow_channel = 1           ; 1 / 6 / 11 (per-car)
custom_button2_pin = 1              ; external button (GPIO1); -1 = disable
custom_i2c_clock_hz = 400000
custom_has_display = 1              ; compile the dash gauge driver into the single image (runtime NVS has_display gates use); 0 strips it for a smaller build
custom_tft_sck = 4
custom_tft_mosi = 5
custom_tft_miso = 8
custom_tft_cs = 6
custom_tft_dc = 7
custom_tft_rst = 15
custom_touch_cs = 9
custom_touch_irq = 33
custom_version = 0.3.0              ; x-release-please-version
extra_scripts = pre:extra_script.py
lib_ldf_mode = chain+
; Libraries are vendored under lib/ (offline): ArduinoJson, and for the
; mlx90640 build Adafruit_BusIO, Adafruit_Unified_Sensor, Adafruit_MLX90640.
lib_deps =

; Real-sensor build target. Same firmware as default but links the MLX90640
; driver instead of the mock. Flash with: pio run -e mlx90640 -t upload
[env:mlx90640]
extends = env:esp32-s3-devkitc-1
custom_sensor_type = mlx90640
