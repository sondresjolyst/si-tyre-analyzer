name: 🚀 Create release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      contents: write # update changelog + create the release
      pull-requests: write # create release PRs
      issues: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      fw_release_created: ${{ steps.release.outputs.release_created }}
      fw_tag_name: ${{ steps.release.outputs.tag_name }}
      app_release_created: ${{ steps.release.outputs['tools--release_created'] }}
      app_tag_name: ${{ steps.release.outputs['tools--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  test:
    name: Tests
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true') }}
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    needs: [release-please, test]
    if: ${{ always() && needs.test.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.fw_release_created == 'true') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Read firmware metadata
        id: meta
        run: |
          PRODUCER=$(grep '^custom_producer_name' platformio.ini | awk -F' *= *' '{print $2}' | tr -d ' ')
          VERSION=v$(grep '^custom_version' platformio.ini | awk -F' *= *' '{print $2}' | cut -d';' -f1 | tr -d ' ')
          echo "firmware_name=firmware_${PRODUCER}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        run: pio run --environment esp32-s3-devkitc-1

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.firmware_name }}
          path: .pio/build/esp32-s3-devkitc-1/${{ steps.meta.outputs.firmware_name }}.bin
          if-no-files-found: error

      - name: Attach firmware to release
        if: ${{ needs.release-please.outputs.fw_release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          FW_TAG: ${{ needs.release-please.outputs.fw_tag_name }}
          FW_NAME: ${{ steps.meta.outputs.firmware_name }}
        run: gh release upload "$FW_TAG" ".pio/build/esp32-s3-devkitc-1/$FW_NAME.bin" --clobber

  build-app:
    name: Build desktop app
    runs-on: ubuntu-24.04
    needs: [release-please, test]
    if: ${{ always() && needs.test.result == 'success' && needs.release-please.outputs.app_release_created == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build wheel
        working-directory: tools
        run: uv build --wheel --out-dir dist

      - name: Attach wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_TAG: ${{ needs.release-please.outputs.app_tag_name }}
        run: gh release upload "$APP_TAG" tools/dist/*.whl --clobber
