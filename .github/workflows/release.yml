name: 🚀 Create release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fw_tag:
        description: "Firmware release tag to build and attach (e.g. si-tyre-analyzer-v0.6.0). Leave empty to skip."
        type: string
        required: false
      app_tag:
        description: "Desktop app release tag to build and attach (e.g. si-tyre-analyzer-app-v0.5.0). Leave empty to skip."
        type: string
        required: false

permissions: {}

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    uses: equinor/ops-actions/.github/workflows/release-please-manifest.yml@792c28d178029e9d2b5ae027e3acbe18da89e9ed # v9.38.2
    permissions:
      contents: write
      pull-requests: write
      issues: write

  test:
    name: Tests
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true') }}
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  get-tags:
    name: Get Release Tags
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.releases_created == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.fw_tag != '' || inputs.app_tag != ''))) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      fw_tag: ${{ steps.get-tags.outputs.fw_tag }}
      app_tag: ${{ steps.get-tags.outputs.app_tag }}
    steps:
      - name: Get tags
        id: get-tags
        env:
          GH_TOKEN: ${{ github.token }}
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          paths="${PATHS_RELEASED:-[]}"
          fw_tag="${{ inputs.fw_tag }}"
          app_tag="${{ inputs.app_tag }}"
          if [ -z "$fw_tag" ] && echo "$paths" | jq -e 'contains(["."])' > /dev/null 2>&1; then
            fw_tag=$(gh api repos/${{ github.repository }}/releases --jq '[.[] | select(.tag_name | startswith("si-tyre-analyzer-v"))] | first | .tag_name // empty')
          fi
          if [ -z "$app_tag" ] && echo "$paths" | jq -e 'contains(["tools"])' > /dev/null 2>&1; then
            app_tag=$(gh api repos/${{ github.repository }}/releases --jq '[.[] | select(.tag_name | startswith("si-tyre-analyzer-app-v"))] | first | .tag_name // empty')
          fi
          echo "fw_tag=$fw_tag" >> "$GITHUB_OUTPUT"
          echo "app_tag=$app_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    needs: [release-please, test, get-tags]
    if: ${{ always() && needs.test.result == 'success' && needs.get-tags.outputs.fw_tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Read firmware metadata
        id: meta
        run: |
          PRODUCER=$(grep '^custom_producer_name' platformio.ini | awk -F' *= *' '{print $2}' | tr -d ' ')
          VERSION=v$(grep '^custom_version' platformio.ini | awk -F' *= *' '{print $2}' | cut -d';' -f1 | tr -d ' ')
          echo "firmware_name=firmware_${PRODUCER}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        run: pio run --environment esp32-s3-devkitc-1

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.firmware_name }}
          path: .pio/build/esp32-s3-devkitc-1/${{ steps.meta.outputs.firmware_name }}.bin
          if-no-files-found: error

      - name: Attach firmware to release
        if: ${{ needs.get-tags.outputs.fw_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          FW_TAG: ${{ needs.get-tags.outputs.fw_tag }}
          FW_NAME: ${{ steps.meta.outputs.firmware_name }}
        run: gh release upload "$FW_TAG" ".pio/build/esp32-s3-devkitc-1/$FW_NAME.bin" --clobber

  build-app:
    name: Build desktop app
    runs-on: ubuntu-24.04
    needs: [release-please, test, get-tags]
    if: ${{ always() && needs.test.result == 'success' && needs.get-tags.outputs.app_tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build wheel
        working-directory: tools
        run: uv build --wheel --out-dir dist

      - name: Attach wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_TAG: ${{ needs.get-tags.outputs.app_tag }}
        run: gh release upload "$APP_TAG" tools/dist/*.whl --clobber
