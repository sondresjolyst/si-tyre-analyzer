name: 🚀 Create release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    uses: equinor/ops-actions/.github/workflows/release-please-manifest.yml@792c28d178029e9d2b5ae027e3acbe18da89e9ed # v9.38.2
    permissions:
      contents: write
      pull-requests: write
      issues: write

  test:
    name: Tests
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true') }}
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    needs: [release-please, test]
    if: ${{ always() && needs.test.result == 'success' && (github.event_name == 'workflow_dispatch' || fromJSON(needs.release-please.outputs.path_tag_names)['si-tyre-analyzer'] != '') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Read firmware metadata
        id: meta
        run: |
          PRODUCER=$(grep '^custom_producer_name' platformio.ini | awk -F' *= *' '{print $2}' | tr -d ' ')
          VERSION=v$(grep '^custom_version' platformio.ini | awk -F' *= *' '{print $2}' | cut -d';' -f1 | tr -d ' ')
          echo "firmware_name=firmware_${PRODUCER}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        run: pio run --environment esp32-s3-devkitc-1

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.firmware_name }}
          path: .pio/build/esp32-s3-devkitc-1/${{ steps.meta.outputs.firmware_name }}.bin
          if-no-files-found: error

      - name: Attach firmware to release
        if: ${{ fromJSON(needs.release-please.outputs.path_tag_names)['si-tyre-analyzer'] != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          FW_TAG: ${{ fromJSON(needs.release-please.outputs.path_tag_names)['si-tyre-analyzer'] }}
          FW_NAME: ${{ steps.meta.outputs.firmware_name }}
        run: gh release upload "$FW_TAG" ".pio/build/esp32-s3-devkitc-1/$FW_NAME.bin" --clobber

  build-app:
    name: Build desktop app
    runs-on: ubuntu-24.04
    needs: [release-please, test]
    if: ${{ always() && needs.test.result == 'success' && fromJSON(needs.release-please.outputs.path_tag_names)['si-tyre-analyzer-app'] != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel
        working-directory: tools
        run: uv build --wheel --out-dir dist

      - name: Attach wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_TAG: ${{ fromJSON(needs.release-please.outputs.path_tag_names)['si-tyre-analyzer-app'] }}
        run: gh release upload "$APP_TAG" tools/dist/*.whl --clobber
