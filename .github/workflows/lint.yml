name: 🧹 Lint

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "platformio.ini"

permissions: {}

jobs:
  lint-codebase:
    name: Lint codebase
    uses: equinor/ops-actions/.github/workflows/super-linter.yml@492516f19214a297c5f9ba6526bedb2a42c775d1
    permissions:
      contents: read
      statuses: write
    with:
      filter_regex_exclude: (.*CHANGELOG\.md$|docs/workflows/.*|lib/.*|tools/.*_preview\.html$)
