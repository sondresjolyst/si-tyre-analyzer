name: 🧪 Test

on:
  workflow_call:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
    paths:
      - "src/**"
      - "tools/**"
      - "test/**"
      - "lib/**"
      - ".github/workflows/test.yml"

permissions: {}

jobs:
  native-tests:
    name: Native tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        run: |
          pio test -e native_downsample
          pio test -e native_logformat
          pio test -e native_version
          pio test -e native_colormap

  python-tests:
    name: Python tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run analyzer tests
        working-directory: tools
        run: uv run pytest
